name: ARC Runner Smoke

on:
  pull_request:
    paths:
      - .github/workflows/arc-runner-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ARC runner route
    runs-on: [self-hosted, Linux, x64, arc, ci]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print runner context
        run: |
          echo "runner.name=${{ runner.name }}"
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"

      - name: Print host kernel
        run: uname -a

      - name: Assert x86_64 architecture
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              echo "arch=$arch"
              ;;
            *)
              echo "Unexpected architecture: $arch" >&2
              exit 1
              ;;
          esac
