name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    # Low-risk non-smoke ARC graduation workload for
    # agentsia-uk/Modelsmith#2214 and agentsia-uk/Modelsmith#2296. The harness
    # CI suite is CPU-only TypeScript validation and deterministic tests; it
    # does not need GPU, Docker privilege, private network access, deploy
    # credentials, or subscription-auth AI state.
    runs-on: [self-hosted, Linux, x64, arc, arc-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Modelsmith cross-repo contract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dest="${GITHUB_WORKSPACE}/../Modelsmith/config/cross-repo-release-contract.json"
          if [ ! -f "$dest" ]; then
            mkdir -p "$(dirname "$dest")"
            if gh api repos/agentsia-uk/Modelsmith/contents/config/cross-repo-release-contract.json \
              --jq '.content' | base64 -d > "$dest"; then
              echo "Fetched Modelsmith cross-repo contract"
            else
              rm -f "$dest"
              echo "::warning::Unable to fetch private Modelsmith contract with this repo token; validator will run offline CI-signal checks."
            fi
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm lint
      - run: pnpm contracts:cross-repo
      - run: pnpm typecheck
      # Direct command is intentional: Modelsmith#3953's reality check scans
      # sibling workflow files for the deployed package-manager audit gate.
      # This is a fail-closed high-severity production dependency gate.
      - run: pnpm audit --prod --audit-level high
      - run: pnpm test
      - run: pnpm build
      # Dead-code and dependency-minimalism audit (agentsia-uk/Modelsmith#2077).
      # knip is pure static analysis: no provider API keys, no network access.
      - run: pnpm audit:deadcode

  # Org shared secrets-scan (agentsia-uk/Modelsmith#3951; Rule-16 security gate).
  # Consumes the single-source-of-truth reusable workflow so the arch-aware
  # gitleaks install + `gitleaks detect` step never drifts from the sibling
  # repos. SHA-pinned per council S2 (cross-org `uses:` MUST be a 40-char SHA).
  # gitleaks-version is held equal to the Modelsmith cross-repo qualityBaseline
  # contract (8.21.2) — do not drift. runs-on overrides the workflow default to
  # match this repo's ARC self-hosted pool.
  secrets-scan:
    uses: agentsia-uk/ci-shared/.github/workflows/shared-secrets-scan.yml@239c757e1609d3ba3af5ef5e122b19c42e09c458
    with:
      gitleaks-version: "8.21.2"
      runs-on: '["self-hosted", "Linux", "x64", "arc", "arc-ci"]'
    permissions:
      contents: read
