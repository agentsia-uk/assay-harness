name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  quality-context:
    name: Quality context
    runs-on: [self-hosted, Linux, ci]
    outputs:
      should_review: ${{ steps.gate.outputs.should_review }}
    steps:
      - name: Decide whether advisory review should run
        id: gate
        env:
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [ "$IS_DRAFT" = "true" ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            echo "Draft PR: advisory AI review skipped. CI owns typecheck, test, and build."
          elif [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR: advisory AI review skipped because repository secrets are unavailable."
          else
            echo "should_review=true" >> "$GITHUB_OUTPUT"
            echo "Ready same-repository PR: advisory AI review may run."
          fi

  codex-review:
    name: Codex review
    needs: quality-context
    if: needs.quality-context.outputs.should_review == 'true'
    runs-on: [self-hosted, Linux, ai-review]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    outputs:
      final_message: ${{ steps.run-codex.outputs.final-message }}
    steps:
      - name: Check Codex secret
        id: config
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured. Quality checks ran, but Codex review is skipped."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Fetch base and head refs
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"
      - name: Run Codex review
        if: steps.config.outputs.enabled == 'true'
        id: run-codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            ### Codex Review: Implementation & Hygiene

            You are the first agent in a three-part "Chain of Review" (Codex -> Gemini -> Claude).
            Your role is "The Implementation & Hygiene Expert".

            Review only the changes introduced by the PR. Focus exclusively on:
            - Benchmark implementation hygiene: code structure, naming, and readability.
            - Provider adapter correctness and type safety.
            - Deterministic behaviour.
            - Performance micro-optimizations.

            Do NOT focus on architecture or strategic alignment.

            Pull request title: ${{ github.event.pull_request.title }}

  post-feedback:
    name: Post Codex feedback
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    runs-on: [self-hosted, Linux, ci]
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

  gemini-review:
    name: Gemini review
    needs: [quality-context, codex-review]
    if: always() && needs.quality-context.outputs.should_review == 'true' && (needs.codex-review.result == 'success' || needs.codex-review.result == 'failure' || needs.codex-review.result == 'skipped')
    runs-on: [self-hosted, Linux, ai-review]
    steps:
      - name: Check Gemini secret
        id: config
        env:
          GOOGLE_CLOUD_ACCESS_TOKEN: ${{ secrets.GEMINI_CLI_OAUTH_TOKEN }}
        run: |
          if [ -n "$GOOGLE_CLOUD_ACCESS_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GEMINI_CLI_OAUTH_TOKEN is not configured. Gemini review is skipped."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.enabled == 'true'
        with:
          node-version: '22'
      - name: Fetch comments
        if: steps.config.outputs.enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const body = comments.map((comment) => `${comment.user.login}: ${comment.body}`).join('\n');
            await require('node:fs/promises').writeFile('pr_comments.txt', body);
      - name: Run Gemini Review
        if: steps.config.outputs.enabled == 'true'
        env:
          GOOGLE_CLOUD_ACCESS_TOKEN: ${{ secrets.GEMINI_CLI_OAUTH_TOKEN }}
          GEMINI_TRUST_WORKSPACE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_COMMENTS=$(cat pr_comments.txt)
          npx -y @google/gemini-cli --yolo --prompt "### Gemini Review: Logic & Boundaries
          Take over hygiene if ### Codex Review is missing. Build on existing comments."

  claude-review:
    name: Claude review
    needs: [quality-context, gemini-review]
    if: always() && needs.quality-context.outputs.should_review == 'true' && (needs.gemini-review.result == 'success' || needs.gemini-review.result == 'failure' || needs.gemini-review.result == 'skipped')
    runs-on: [self-hosted, Linux, ai-review]
    steps:
      - name: Check Claude secret
        id: config
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CLAUDE_CODE_OAUTH_TOKEN is not configured. Claude review is skipped."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
      - name: Fetch comments
        if: steps.config.outputs.enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const body = comments.map((comment) => `${comment.user.login}: ${comment.body}`).join('\n');
            await require('node:fs/promises').writeFile('pr_comments.txt', body);
      - name: Run Claude Review
        if: steps.config.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ### Claude Review: Architecture & Strategy
            Take over if Codex or Gemini headers are missing. Build on previous.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
