<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Assay-Adtech v1 frontier model performance</title>
  <desc id="desc">Composite scores for Claude Opus 4.7, GPT 5.5, and Gemini 3.1 Pro Preview across three Assay-Adtech proof clusters. Modelsmith branding and scenario-set hash included.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f3ed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2b2118" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f2eee8; }
      .card { fill: url(#panel); stroke: #d8cfc4; stroke-width: 1.5; filter: url(#shadow); }
      .ink { fill: #1f252e; }
      .muted { fill: #667085; }
      .fine { fill: #8a7b6e; }
      .grid { stroke: #e1d8ce; stroke-width: 1; }
      .axis { stroke: #a89b8f; stroke-width: 1.4; }
      .tick { fill: #786c61; font: 15px Arial, sans-serif; }
      .label { fill: #2b3038; font: 700 18px Arial, sans-serif; }
      .small { fill: #667085; font: 14px Arial, sans-serif; }
      .tiny { fill: #7b7168; font: 12px Arial, sans-serif; letter-spacing: 0.8px; }
      .brand { fill: #1f252e; font: 800 38px Arial, sans-serif; letter-spacing: 2px; }
      .headline { fill: #1f252e; font: 800 34px Arial, sans-serif; }
      .subhead { fill: #536171; font: 19px Arial, sans-serif; }
      .score { fill: #1f252e; font: 800 18px Arial, sans-serif; }
      .barLabel { fill: #ffffff; font: 700 13px Arial, sans-serif; }
      .ci { stroke: #2b3038; stroke-width: 2; stroke-linecap: round; opacity: 0.72; }
      .claude { fill: #c75f22; }
      .gpt { fill: #157f73; }
      .gemini { fill: #315fbb; }
      .claudeSoft { fill: #f5d7c4; }
      .gptSoft { fill: #cde9e4; }
      .geminiSoft { fill: #d7e1fb; }
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>
  <rect class="card" x="44" y="38" width="1312" height="744" rx="24"/>

  <g transform="translate(82 76)">
    <rect x="0" y="0" width="74" height="74" rx="18" fill="#1f252e"/>
    <path d="M18 52h38v8H18z" fill="#f3b15e"/>
    <path d="M24 34h26l6 8H18z" fill="#f3b15e"/>
    <path d="M31 18h12v20H31z" fill="#f3b15e"/>
    <path d="M16 18h42v8H16z" fill="#f3b15e"/>
    <circle cx="25" cy="46" r="3.5" fill="#1f252e"/>
    <circle cx="49" cy="46" r="3.5" fill="#1f252e"/>
    <text class="brand" x="96" y="35">MODELSMITH</text>
    <text class="tiny" x="99" y="62">ASSAY-ADTECH V1 FRONTIER PROOF SET</text>
  </g>

  <g transform="translate(880 72)">
    <rect x="0" y="0" width="408" height="96" rx="14" fill="#fbfaf7" stroke="#ddd3c9"/>
    <text class="tiny" x="24" y="28">SCENARIO SET HASH</text>
    <text class="label" x="24" y="55">162ff7fcd8ce</text>
    <text class="small" x="24" y="78">344 governed scenarios, v1.8.0-rc.4</text>
    <text class="small" x="260" y="55" text-anchor="middle">No tools</text>
    <text class="small" x="346" y="55" text-anchor="middle">3 runs each</text>
  </g>

  <text class="headline" x="82" y="208">Frontier AI scores on the Assay-Adtech benchmark</text>
  <text class="subhead" x="82" y="238">Composite percentage scores with 95 percent confidence intervals from the current Modelsmith production-baseline proof package.</text>

