<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Assay-Adtech v1 benchmark gap snapshot</title>
  <desc id="desc">Composite scores for Claude Opus 4.7, GPT 5.5, and Gemini 3.1 Pro Preview on the primary Assay-Adtech no-tools benchmark cluster. The header uses Smith, the Modelsmith sprite.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f6f1"/>
      <stop offset="1" stop-color="#ebe4da"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbf7ef"/>
    </linearGradient>
    <filter id="shadow" x="-6%" y="-8%" width="112%" height="116%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#2b2118" flood-opacity="0.15"/>
    </filter>
    <style>
      text { font-family: Arial, sans-serif; }
      .bg { fill: url(#page); }
      .card { fill: url(#card); stroke: #d8cfc4; stroke-width: 1.5; filter: url(#shadow); }
      .ink { fill: #1f252e; }
      .muted { fill: #526174; }
      .fine { fill: #756b62; }
      .tiny { fill: #756b62; font: 12px Arial, sans-serif; letter-spacing: 1px; }
      .brand { fill: #1f252e; font: 800 36px Arial, sans-serif; letter-spacing: 1.5px; }
      .headline { fill: #1f252e; font: 800 40px Arial, sans-serif; }
      .subhead { fill: #526174; font: 20px Arial, sans-serif; }
      .label { fill: #1f252e; font: 800 22px Arial, sans-serif; }
      .model { fill: #1f252e; font: 800 24px Arial, sans-serif; }
      .lab { fill: #526174; font: 15px Arial, sans-serif; }
      .score { fill: #1f252e; font: 800 30px Arial, sans-serif; }
      .scoreSmall { fill: #526174; font: 15px Arial, sans-serif; }
      .tick { fill: #756b62; font: 15px Arial, sans-serif; }
      .grid { stroke: #e3d9ce; stroke-width: 1; }
      .axis { stroke: #a89b8f; stroke-width: 1.4; }
      .track { fill: #ebe5dc; }
      .ci { stroke: #27313f; stroke-width: 2.2; stroke-linecap: round; opacity: 0.78; }
      .anthropic { fill: #c96423; }
      .openai { fill: #0f766e; }
      .google { fill: #3467d6; }
      .logoTile { stroke-width: 1.2; }
      .logoWhite { fill: #ffffff; }
      .logoDark { fill: #1f252e; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>
  <rect class="card" x="44" y="38" width="1312" height="744" rx="24"/>

  <g transform="translate(80 76)">
    <svg x="6" y="0" width="63" height="76" viewBox="0 0 40 48" shape-rendering="crispEdges" fill="none">
      <rect width="40" height="48" fill="#F6F3EC"/>
      <rect x="14" y="3" width="12" height="3" fill="#0E0F11"/>
      <rect x="11" y="6" width="18" height="2" fill="#0E0F11"/>
      <rect x="11" y="8" width="18" height="1" fill="#3E4148"/>
      <rect x="14" y="9" width="12" height="7" fill="#FBF8F2"/>
      <rect x="14" y="14" width="12" height="2" fill="#EFEBE1"/>
      <rect x="16" y="11" width="2" height="2" fill="#0E0F11"/>
      <rect x="22" y="11" width="2" height="2" fill="#0E0F11"/>
      <rect x="19" y="14" width="2" height="1" fill="#3E4148"/>
      <rect x="18" y="16" width="4" height="1" fill="#FBF8F2"/>
      <rect x="11" y="17" width="18" height="2" fill="#B45A1E"/>
      <rect x="10" y="19" width="20" height="11" fill="#B45A1E"/>
      <rect x="11" y="19" width="1" height="10" fill="#8A3F11"/>
      <rect x="28" y="19" width="1" height="10" fill="#8A3F11"/>
      <rect x="19" y="22" width="2" height="1" fill="#0E0F11"/>
      <rect x="12" y="30" width="7" height="6" fill="#3E4148"/>
      <rect x="21" y="30" width="7" height="6" fill="#3E4148"/>
      <rect x="10" y="36" width="10" height="3" fill="#0E0F11"/>
      <rect x="20" y="36" width="10" height="3" fill="#0E0F11"/>
      <rect x="10" y="36" width="10" height="1" fill="#3E4148"/>
      <rect x="20" y="36" width="10" height="1" fill="#3E4148"/>
      <rect x="7" y="19" width="3" height="6" fill="#B45A1E"/>
      <rect x="7" y="25" width="3" height="4" fill="#FBF8F2"/>
      <rect x="30" y="19" width="3" height="6" fill="#B45A1E"/>
      <rect x="30" y="25" width="3" height="4" fill="#FBF8F2"/>
    </svg>
    <text class="brand" x="98" y="34">MODELSMITH</text>
    <text class="tiny" x="101" y="63">NO-TOOLS GOVERNED BENCHMARK</text>
  </g>

  <g transform="translate(842 70)">
    <rect x="0" y="0" width="450" height="112" rx="16" fill="#fbfaf7" stroke="#ddd3c9"/>
    <text class="tiny" x="24" y="30">PRIMARY BENCHMARK CLUSTER</text>
    <text class="label" x="24" y="62">Assay-Adtech</text>
    <text class="lab" x="24" y="88">344 governed scenarios, no tools</text>
    <line x1="314" y1="24" x2="314" y2="88" stroke="#ddd3c9"/>
    <text class="label" x="382" y="56" text-anchor="middle">100%</text>
    <text class="lab" x="382" y="80" text-anchor="middle">ceiling scale</text>
  </g>

  <text class="headline" x="80" y="224">Frontier models leave a wide governed-adtech gap</text>
  <text class="subhead" x="80" y="256">No-tools composite scores over 344 governed scenarios; 95% intervals shown against a fixed ceiling.</text>

  <g transform="translate(80 326)">
    <line class="grid" x1="430" y1="0" x2="430" y2="296"/>
    <line class="grid" x1="595" y1="0" x2="595" y2="296"/>
    <line class="grid" x1="760" y1="0" x2="760" y2="296"/>
    <line class="grid" x1="925" y1="0" x2="925" y2="296"/>
    <line class="grid" x1="1090" y1="0" x2="1090" y2="296"/>
    <line class="axis" x1="430" y1="-24" x2="1090" y2="-24"/>
    <text class="tick" x="430" y="-34" text-anchor="middle">0</text>
    <text class="tick" x="595" y="-34" text-anchor="middle">25</text>
    <text class="tick" x="760" y="-34" text-anchor="middle">50</text>
    <text class="tick" x="925" y="-34" text-anchor="middle">75</text>
    <text class="tick" x="1090" y="-34" text-anchor="middle">100</text>

    <g transform="translate(0 24)">
      <rect class="logoTile anthropic" x="0" y="0" width="56" height="56" rx="14"/>
      <circle class="logoWhite" cx="28" cy="28" r="13"/>
      <path class="anthropic" d="M28 13l3.4 9.1 9.6-1.5-6.2 7.4 6.2 7.4-9.6-1.5L28 43l-3.4-9.1-9.6 1.5 6.2-7.4-6.2-7.4 9.6 1.5z"/>
      <circle class="logoWhite" cx="28" cy="28" r="4.8"/>
      <text class="model" x="78" y="20">Claude Opus 4.7</text>
      <text class="lab" x="78" y="46">Anthropic</text>
      <rect class="track" x="430" y="5" width="660" height="42" rx="10"/>
      <rect class="anthropic" x="430" y="5" width="275" height="42" rx="10"/>
      <line class="ci" x1="670" y1="26" x2="739" y2="26"/>
      <line class="ci" x1="670" y1="17" x2="670" y2="35"/>
      <line class="ci" x1="739" y1="17" x2="739" y2="35"/>
      <text class="score" x="1130" y="35">41.6%</text>
      <text class="scoreSmall" x="430" y="72">95% CI 36.3 to 46.8</text>
    </g>

    <g transform="translate(0 132)">
      <rect class="logoTile openai" x="0" y="0" width="56" height="56" rx="14"/>
      <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 16c5 0 8 3 8 8 0 3-1.2 5.2-3.6 6.8"/>
        <path d="M36 24c4.4 2.5 5.5 6.5 3 10.8-1.5 2.6-3.7 3.9-6.5 4.1"/>
        <path d="M39 34.8c-2.5 4.4-6.5 5.5-10.8 3-2.6-1.5-3.9-3.7-4.1-6.5"/>
        <path d="M28.2 37.8c-5 0-8-3-8-8 0-3 1.2-5.2 3.6-6.8"/>
        <path d="M20.2 29.8c-4.4-2.5-5.5-6.5-3-10.8 1.5-2.6 3.7-3.9 6.5-4.1"/>
        <path d="M17.2 19c2.5-4.4 6.5-5.5 10.8-3 2.6 1.5 3.9 3.7 4.1 6.5"/>
      </g>
      <text class="model" x="78" y="20">GPT 5.5</text>
      <text class="lab" x="78" y="46">OpenAI</text>
      <rect class="track" x="430" y="5" width="660" height="42" rx="10"/>
      <rect class="openai" x="430" y="5" width="267" height="42" rx="10"/>
      <line class="ci" x1="662" y1="26" x2="731" y2="26"/>
      <line class="ci" x1="662" y1="17" x2="662" y2="35"/>
      <line class="ci" x1="731" y1="17" x2="731" y2="35"/>
      <text class="score" x="1130" y="35">40.4%</text>
      <text class="scoreSmall" x="430" y="72">95% CI 35.2 to 45.6</text>
    </g>

    <g transform="translate(0 240)">
      <rect class="logoTile google" x="0" y="0" width="56" height="56" rx="14"/>
      <path d="M28 11l4.7 11.3L44 27l-11.3 4.7L28 43l-4.7-11.3L12 27l11.3-4.7z" fill="#ffffff"/>
      <text class="model" x="78" y="20">Gemini 3.1 Pro Preview</text>
      <text class="lab" x="78" y="46">Google</text>
      <rect class="track" x="430" y="5" width="660" height="42" rx="10"/>
      <rect class="google" x="430" y="5" width="246" height="42" rx="10"/>
      <line class="ci" x1="643" y1="26" x2="710" y2="26"/>
      <line class="ci" x1="643" y1="17" x2="643" y2="35"/>
      <line class="ci" x1="710" y1="17" x2="710" y2="35"/>
      <text class="score" x="1130" y="35">37.2%</text>
      <text class="scoreSmall" x="430" y="72">95% CI 32.3 to 42.4</text>
    </g>
  </g>

  <g transform="translate(80 690)">
    <rect x="0" y="0" width="1216" height="58" rx="14" fill="#f6f1e8" stroke="#ded4c7"/>
    <text class="fine" x="24" y="24" font-size="14">Bars use a 0 to 100 percent scale. The unfilled track is the remaining gap to the benchmark ceiling.</text>
    <text class="fine" x="24" y="45" font-size="14">Source: Modelsmith production-baseline proof package for Assay-Adtech v1.8.0-rc.4. Public claims must follow the release contract.</text>
  </g>
</svg>
